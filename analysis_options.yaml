


analyzer:
  exclude:
    - .dart_tool/**
    - build/**
    - android/**
    - ios/**
    - web/**
    - migration_exports/**
    - supabase/**
    - lib/custom_code/**
    - lib/application/edit_encounter/**
    - lib/application/encounter/**
    - lib/application/mom_details/**
    - lib/application/mom_details2/**
    - lib/flutter_flow/custom_functions.dart
  errors:
    avoid_print: ignore
    body_might_complete_normally_catch_error: ignore
    dead_null_aware_expression: ignore
    deprecated_member_use: ignore
    invalid_use_of_protected_member: ignore
    invalid_use_of_visible_for_testing_member: ignore
    override_on_non_overriding_member: ignore
    prefer_const_constructors: ignore
    prefer_const_literals_to_create_immutables: ignore
    unreachable_switch_default: ignore
    unnecessary_import: ignore
    unnecessary_null_comparison: ignore
    unnecessary_non_null_assertion: ignore
    use_build_context_synchronously: ignore
    unused_element: ignore
    unused_field: ignore
    unused_import: ignore
    unused_local_variable: ignore
